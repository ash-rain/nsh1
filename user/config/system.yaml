absolute_urls: false

home:
  alias: '/home'

pages:
  theme: netshell
  markdown:
    extra: true
  process:
    markdown: true
    twig: true

languages:
  supported:
    - en
    - bg
  default_lang: en
  include_default_lang: true
  translations: true
  content_fallback:
    bg: ['bg', 'en']

cache:
  enabled: false
  check:
    method: file
  driver: auto
  prefix: 'g'

twig:
  cache: true
  debug: true
  auto_reload: true
  autoescape: true

assets:
  css_pipeline: false
  css_minify: true
  css_rewrite: true
  js_pipeline: false
  js_module_pipeline: false
  js_minify: true

errors:
  display: true
  log: true

debugger:
  enabled: false
  twig: true
  shutdown:
    close_connection: true

gpm:
  verify_peer: true
